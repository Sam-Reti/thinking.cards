<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0098b3"/>
      <stop offset="100%" style="stop-color:#007a91"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed6d1e"/>
      <stop offset="100%" style="stop-color:#d45a10"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03be63"/>
      <stop offset="100%" style="stop-color:#029a50"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Back card (rotated left) -->
  <g transform="translate(256, 270) rotate(-12)">
    <rect x="-75" y="-105" width="150" height="195" rx="14" fill="url(#card3)" opacity="0.7"/>
  </g>

  <!-- Middle card (rotated right) -->
  <g transform="translate(256, 265) rotate(8)">
    <rect x="-75" y="-105" width="150" height="195" rx="14" fill="url(#card2)" opacity="0.8"/>
  </g>

  <!-- Front card (center) -->
  <g transform="translate(256, 258)">
    <rect x="-80" y="-110" width="160" height="200" rx="16" fill="url(#card1)"/>
    <!-- Question mark -->
    <text x="0" y="20" text-anchor="middle" font-family="Poppins, sans-serif" font-size="110" font-weight="800" fill="white" opacity="0.95">?</text>
  </g>

  <!-- Thought bubbles -->
  <circle cx="155" cy="115" r="14" fill="#e7c53b" opacity="0.7"/>
  <circle cx="130" cy="140" r="9" fill="#e7c53b" opacity="0.5"/>
  <circle cx="115" cy="160" r="5" fill="#e7c53b" opacity="0.35"/>

  <!-- Small sparkle top right -->
  <circle cx="370" cy="105" r="12" fill="#b30086" opacity="0.6"/>
  <circle cx="390" cy="130" r="7" fill="#b30086" opacity="0.4"/>
</svg>
